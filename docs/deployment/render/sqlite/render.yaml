services:
  - type: web
    name: instatic
    runtime: image
    image:
      url: ghcr.io/corebunch/instatic:latest
    plan: starter
    numInstances: 1
    healthCheckPath: /health
    autoDeployTrigger: off
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        value: sqlite:/app/storage/data/cms.db
      - key: UPLOADS_DIR
        value: /app/storage/uploads
      - key: STATIC_DIR
        value: /app/dist
      - key: INSTATIC_SECRET_KEY
        generateValue: true
    disk:
      name: storage
      mountPath: /app/storage
      sizeGB: 10
